<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Arrivals — Results</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ebebeb;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
  }

  .phone {
    width: 100%;
    max-width: 440px;
    min-height: 100vh;
    background: #fff;
    position: relative;
    overflow-x: hidden;
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 22px 0;
    height: 44px;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: #111;
  }
  .status-icons { display: flex; align-items: center; gap: 7px; }

  /* ── Sticky Header ── */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.90);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  /* ── Search Bar Row ── */
  .search-wrap { padding: 10px 14px 8px; }
  .search-bar {
    display: flex;
    align-items: center;
    background: #f0f0f0;
    border-radius: 999px;
    padding: 9px 14px;
    gap: 8px;
  }
  .back-btn {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    color: #111;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .search-text {
    flex: 1;
    font-size: 15px;
    color: #2D2D2D;
    font-weight: 400;
  }
  .icon-cam { color: #2D2D2D; flex-shrink: 0; }

  /* ── Sort / Filter Bar ── */
  .sort-filter-bar {
    display: flex;
    align-items: stretch;
    border-top: 1px solid #e8e8e8;
    border-bottom: 1px solid #e8e8e8;
  }
  .sf-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 16px 0;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #2D2D2D;
    text-transform: uppercase;
    background: none;
    border: none;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  .sf-btn:active { background: #f5f5f5; }
  .sf-divider {
    width: 1px;
    background: #e8e8e8;
    align-self: stretch;
    margin: 12px 0;
  }

  /* ── Items Count ── */
  .items-count {
    text-align: center;
    font-size: 13px;
    color: #888;
    padding: 12px 0;
    letter-spacing: 0.01em;
  }

  /* ── Product Grid ── */
  .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding-bottom: 100px;
  }

  .product-card {
    position: relative;
    background: #fff;
  }

  .product-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 2/3;
    background: #e8e8e8;
  }
  .product-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    overflow: hidden;
  }

  /* SELLING FAST badge */
  .badge-selling {
    position: absolute;
    bottom: 10px;
    left: 0;
    background: rgba(45,45,45,0.82);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px;
    pointer-events: none;
    z-index: 5;
  }

  /* ── Heart Button ── */
  .heart-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 28px;
    height: 28px;
    background: none;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
    overflow: visible;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .heart-inner {
    position: relative;
    width: 32px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .glow-ring {
    position: absolute;
    inset: -1px;
    border-radius: 50%;
    border: 2px solid rgba(232, 0, 58, 0.55);
    opacity: 0;
    pointer-events: none;
    z-index: 1;
  }

  .flash-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0);
    pointer-events: none;
    z-index: 2;
  }

  .heart-svg {
    width: 32px;
    height: 28px;
    overflow: visible;
    position: relative;
    z-index: 3;
  }

  .h-base {
    fill: #fff;
    stroke: #2D2D2D;
    stroke-width: 2;
    transition: fill 0.2s, stroke 0.2s;
  }
  .h-fill {
    fill: #e8003a;
    opacity: 0;
    transition: opacity 0.08s;
  }

  .heart-btn.is-saved .h-fill { opacity: 1; }
  .heart-btn.is-saved .h-base {
    fill: #e8003a;
    stroke: #e8003a;
  }

  @keyframes spring-save {
    0%   { transform: scale(1); }
    18%  { transform: scale(1.55); }
    38%  { transform: scale(0.82); }
    58%  { transform: scale(1.25); }
    74%  { transform: scale(0.93); }
    88%  { transform: scale(1.07); }
    100% { transform: scale(1); }
  }
  @keyframes spring-unsave {
    0%   { transform: scale(1); }
    25%  { transform: scale(0.70); }
    55%  { transform: scale(1.09); }
    78%  { transform: scale(0.97); }
    100% { transform: scale(1); }
  }

  .heart-btn.anim-save .heart-inner {
    animation: spring-save 0.58s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .heart-btn.anim-unsave .heart-inner {
    animation: spring-unsave 0.38s ease forwards;
  }

  @keyframes glow-expand {
    0%   { transform: scale(1); opacity: 0.85; }
    100% { transform: scale(3.0); opacity: 0; }
  }
  .heart-btn.anim-save .glow-ring {
    animation: glow-expand 0.52s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.06s forwards;
  }

  @keyframes flash-in {
    0%   { background: rgba(255,255,255,0); }
    25%  { background: rgba(255,255,255,0.45); }
    100% { background: rgba(255,255,255,0); }
  }
  .heart-btn.anim-save .flash-ring {
    animation: flash-in 0.3s ease forwards;
  }

  .h-clip-rect {
    transform: translateY(14px);
    transition: none;
  }
  .heart-btn.is-saved .h-clip-rect {
    transform: translateY(0px);
    transition: transform 0.44s cubic-bezier(0.22, 1, 0.36, 1) 0.05s;
  }

  /* ── Particles ── */
  .particle {
    position: absolute;
    top: 50%;
    left: 50%;
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }
  @keyframes ptcl {
    0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    35%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(var(--r)); opacity: 0; }
  }
  .heart-btn.anim-save .particle {
    animation: ptcl 0.58s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── Floating Heart ── */
  .float-heart {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 20px;
    height: 20px;
    pointer-events: none;
    opacity: 0;
    z-index: 30;
    transform: translateY(0) scale(0.5);
  }
  .float-heart svg { width: 100%; height: 100%; }
  .float-heart svg path { fill: #e8003a; }

  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(0) scale(0.4); }
    15%  { opacity: 0.9; transform: translateY(-6px) scale(1); }
    70%  { opacity: 0.7; transform: translateY(-34px) scale(0.85); }
    100% { opacity: 0; transform: translateY(-52px) scale(0.6); }
  }
  .float-heart.firing {
    animation: float-up 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.08s;
  }

  /* ── Product Info ── */
  .product-info {
    padding: 8px 8px 24px;
  }
  .product-price {
    font-size: 16px;
    font-weight: 800;
    color: #111;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  .product-name {
    font-size: 13px;
    font-weight: 400;
    color: #111;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .product-meta {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #555;
    text-transform: uppercase;
  }
  .product-meta.mix { color: #555; }

  /* ── Bottom Nav ── */
  .bottom-nav-wrap {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    width: 100%;
    max-width: 440px;
    padding: 10px 16px 16px;
    background: transparent;
    pointer-events: none;
  }
  .bottom-nav {
    pointer-events: all;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-radius: 999px;
    background: linear-gradient(
      160deg,
      rgba(255,255,255,0.50) 0%,
      rgba(220,228,240,0.40) 60%,
      rgba(200,215,235,0.30) 100%
    );
    backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
    -webkit-backdrop-filter: blur(28px) saturate(1.6) brightness(1.08);
    border: 1px solid rgba(255,255,255,0.5);
    box-shadow:
      0 1px 0 0 rgba(255,255,255,0.9) inset,
      0 -1px 0 0 rgba(180,195,220,0.3) inset,
      0 8px 32px rgba(100,120,160,0.18),
      0 2px 8px rgba(80,100,140,0.12);
    position: relative;
    overflow: hidden;
  }
  .bottom-nav::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 999px;
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.35) 0%,
      rgba(255,255,255,0) 50%
    );
    pointer-events: none;
  }
  .bottom-nav-item {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
    position: relative;
    z-index: 1;
  }
  .bottom-nav-item:active { opacity: 0.5; }

</style>

let uid = 0;

function buildCard(p) {
  const svgNS = 'http://www.w3.org/2000/svg';
  const id = uid++;

  const card = document.createElement('div');
  card.className = 'product-card';

  const imgWrap = document.createElement('div');
  imgWrap.className = 'product-img-wrap';

  const img = document.createElement('img');
  img.src = p.src;
  img.alt = '';
  img.loading = 'lazy';
  imgWrap.appendChild(img);

  if (p.badge) {
    const badge = document.createElement('div');
    badge.className = 'badge-selling';
    badge.textContent = p.badge;
    imgWrap.appendChild(badge);
  }

  const floatHeart = document.createElement('div');
  floatHeart.className = 'float-heart';
  floatHeart.innerHTML = `<svg viewBox="0 0 ${VW} ${VH}" overflow="visible"><path d="${HP_BASE}" fill="#e8003a"/></svg>`;
  imgWrap.appendChild(floatHeart);

  const btn = document.createElement('button');
  btn.className = 'heart-btn' + (p.saved ? ' is-saved' : '');
  btn.setAttribute('aria-label', 'Save item');
  btn.dataset.saved = p.saved ? '1' : '0';

  const glowRing = document.createElement('div');
  glowRing.className = 'glow-ring';
  btn.appendChild(glowRing);

  const flashRing = document.createElement('div');
  flashRing.className = 'flash-ring';
  btn.appendChild(flashRing);

  PARTICLES.forEach(pp => {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `width:${pp.sz}px;height:${pp.sz}px;background:${pp.c};--tx:${pp.tx}px;--ty:${pp.ty}px;--r:${pp.r};animation-delay:${pp.d}ms;`;
    btn.appendChild(el);
  });

  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  svg.setAttribute('width', '32');
  svg.setAttribute('height', '28');
  svg.setAttribute('class', 'heart-svg');
  svg.setAttribute('overflow', 'visible');

  const defs = document.createElementNS(svgNS, 'defs');
  defs.innerHTML = `
    <clipPath id="hc-${id}">
      <rect class="h-clip-rect" x="4" y="6" width="16" height="14"/>
    </clipPath>
  `;
  svg.appendChild(defs);

  const g = document.createElementNS(svgNS, 'g');

  const basePath = document.createElementNS(svgNS, 'path');
  basePath.setAttribute('d', HP_BASE);
  basePath.setAttribute('fill-rule', 'evenodd');
  basePath.setAttribute('clip-rule', 'evenodd');
  basePath.setAttribute('class', 'h-base');
  g.appendChild(basePath);

  const fillPath = document.createElementNS(svgNS, 'path');
  fillPath.setAttribute('d', HP_BASE);
  fillPath.setAttribute('fill-rule', 'evenodd');
  fillPath.setAttribute('clip-rule', 'evenodd');
  fillPath.setAttribute('class', 'h-fill');
  fillPath.style.clipPath = `url(#hc-${id})`;
  g.appendChild(fillPath);

  svg.appendChild(g);

  const inner = document.createElement('div');
  inner.className = 'heart-inner';
  inner.appendChild(svg);
  btn.appendChild(inner);

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const saving = btn.dataset.saved !== '1';
    btn.classList.remove('anim-save', 'anim-unsave');
    void btn.offsetWidth;

    if (saving) {
      btn.dataset.saved = '1';
      btn.classList.add('anim-save');
      setTimeout(() => btn.classList.add('is-saved'), 55);
      setTimeout(() => btn.classList.remove('anim-save'), 660);
      floatHeart.classList.remove('firing');
      void floatHeart.offsetWidth;
      floatHeart.classList.add('firing');
      setTimeout(() => floatHeart.classList.remove('firing'), 820);
    } else {
      btn.dataset.saved = '0';
      btn.classList.add('anim-unsave');
      btn.classList.remove('is-saved');
      setTimeout(() => btn.classList.remove('anim-unsave'), 420);
    }
  });

  imgWrap.appendChild(btn);
  card.appendChild(imgWrap);

  const info = document.createElement('div');
  info.className = 'product-info';

  const price = document.createElement('div');
  price.className = 'product-price';
  price.textContent = p.price;
  info.appendChild(price);

  const name = document.createElement('div');
  name.className = 'product-name';
  name.textContent = p.name;
  info.appendChild(name);

  if (p.meta) {
    const meta = document.createElement('div');
    meta.className = 'product-meta' + (p.meta === 'MIX & MATCH' ? ' mix' : '');
    meta.textContent = p.meta;
    info.appendChild(meta);
  }

  card.appendChild(info);
  return card;
}

const grid = document.getElementById('product-grid');
PRODUCTS.forEach(p => grid.appendChild(buildCard(p)));
